name: ML Pipeline

# When should this pipeline run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual triggering from GitHub UI

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run tests
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download dataset
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          pip install kaggle
          kaggle datasets download -d uciml/pima-indians-diabetes-database -p data --unzip

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # Job 2: Train and evaluate model
  # ──────────────────────────────────────────────
  train:
    name: Train and Evaluate
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download dataset
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          pip install kaggle
          kaggle datasets download -d uciml/pima-indians-diabetes-database -p data --unzip

      - name: Train all models
        run: python src/train.py

      - name: Run drift detection
        run: |
          python -c "
          import pandas as pd
          df = pd.read_csv('data/diabetes.csv')
          split = int(len(df) * 0.7)
          df.iloc[:split].to_csv('data/reference.csv', index=False)
          df.iloc[split:].to_csv('data/current.csv', index=False)
          "
          python detect_drift.py data/reference.csv data/current.csv

      - name: Upload trained model as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: best_model.pkl

      - name: Upload drift report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: reports/drift_check_report.html
